<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container mx-auto ">
       <h2 class="text-6xl font-bold  text-green-500 mb-3 text-center">Choose your trees</h2>

       <section class="grid grid-cols-12 gap-6">
         <div class="bg-white card card-body shadow-xl  col-span-3 space-y-3">
            <h2 class="text-2xl font-bold">categories</h2>
            <div class="space-y-3">
                <button  class="btn btn-primary w-full" id="alltrees">All trees</button>
                <div id="catcontainer" class="space-y-3">

                </div>
            </div>
         </div>

         <div class="bg-white card card-body shadow-xl col-span-6">
            <div id="treeContainer" class="grid grid-cols-3 sm:grid-cols-3 gap-6">



   



            </div>
         </div>
         <div class="bg-white card card-body shadow-xl col-span-3">
            <h2 class="text-2xl font-bold">cart</h2>

    </div>  
       </section>

       <!-- Open the modal using ID.showModal() method -->

<dialog id="tree-details-modal" class="modal">
  <div class="modal-box">
   
      <div class="flex justify-between items-start mb-4">
                    <h3 class="font-bold text-2xl text-green-700" id="modalTitle">Tree Details</h3>
                    <button class="btn btn-sm btn-circle btn-ghost"
                        onclick="document.getElementById('tree-details-modal').close()">✕</button>
                </div>

                <!-- Modal Content -->
                <div class=" gap-6">
                    <!-- Plant Image -->
                    <img id="modalImage" src="" alt="plant" class="w-full !h-[250px] object-cover rounded-lg mb-12">

                    <!-- Plant Details -->
                    <div class="">
                        <p class="text-sm text-gray-500 mb-2">
                            <span class="font-bold">Category:</span>
                            <span id="modalCategory" class="badge badge-primary"></span>
                        </p>
                        <p class="text-sm text-gray-600 mb-4">
                            <span id="modalDescription"></span>
                        </p>
                        <div class="flex items-baseline gap-2 mb-6">
                            <span class="text-3xl font-bold text-green-600">$<span id="modalPrice">0</span></span>
                        </div>
                    </div>
                </div>



    <div class="modal-action">
      <form method="dialog">
        <!-- if there is a button in form, it will close the modal -->
        <button class="btn">Close</button>
      </form>
    </div>
  </div>
</dialog>
    </main>

    <script src="script.js"></script>
</body>
</html>
